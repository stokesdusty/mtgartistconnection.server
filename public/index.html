    <meta charset="utf-8" />
    <script>try{if(localStorage.getItem('color-mode')==='dark'){document.documentElement.dataset.dark=''}}catch(e){}</script>
    <style>
      :root {
        --c-bg-default: #ffffff; --c-bg-paper: #faf9f7; --c-bg-dark: #f5f3f0;
        --c-text-primary: #201e1b; --c-text-secondary: #736d67;
        --c-text-disabled: #b9b4ae; --c-text-hint: #9c9690;
        --c-neutral-white: #ffffff; --c-neutral-50: #faf9f7;

        --c-primary-main: #2d4a36; --c-primary-lighter: #f0f9f4;
        --c-primary-main-rgb: 45, 74, 54;
      }
      html[data-dark] {
        --c-bg-default: #1a1917; --c-bg-paper: #201e1b; --c-bg-dark: #2a2724;
        --c-text-primary: #f5f3f0; --c-text-secondary: #9c9690;

        --c-neutral-100: #2a2724; --c-neutral-200: #3a3733; --c-neutral-300: #4a4743;
        --c-primary-main: #6ea880; --c-primary-lighter: #1e3328;
        --c-primary-main-rgb: 110, 168, 128;
      }
      html, body { background-color: var(--c-bg-default); }
